worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Must match MAX_ZIP_SIZE in the API
    client_max_body_size 100m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Upstreams
    upstream api_backend {
        server api:8000;
    }
    upstream web_backend {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;

        # --- Security: block hidden files ---
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # --- API reverse proxy ---
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_request_buffering off;
        }

        # --- Deployed static sites ---
        #
        # /s/{deployId}/path  →  /data/deployments/{deployId}/path
        #
        # Use root + rewrite to strip /s/ prefix.
        # No nested location for static assets to avoid $uri confusion.
        #
        location ~ ^/s/([A-Za-z0-9_-]+)(/.*)?$ {
            root /data/deployments;
            index index.html;

            # Rewrite /s/{deployId}/path → /{deployId}/path
            rewrite ^/s/([A-Za-z0-9_-]+)(/.*)?$ /$1$2 break;

            # try_files: file → file/index.html → dir (with index) → SPA fallback
            try_files $uri $uri/index.html $uri/ @spa;
        }

        # SPA fallback: serve /{deployId}/index.html
        location @spa {
            root /data/deployments;
            # $uri is /{deployId}/some/path after rewrite
            # Rewrite to /{deployId}/index.html
            rewrite ^/([A-Za-z0-9_-]+)/.*$ /$1/index.html break;
            try_files $uri =404;
        }

        # Redirect /s/{deployId} (no trailing slash) → /s/{deployId}/
        location ~ ^/s/([A-Za-z0-9_-]+)$ {
            return 301 /s/$1/;
        }

        # --- Next.js web console (pages + _next assets) ---
        location / {
            proxy_pass http://web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

services:
  # ──────────────────────────────────────────────
  # FastAPI — deployment API + SQLite
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        IMAGE_REGISTRY: ${IMAGE_REGISTRY:-}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.org/simple}
    restart: unless-stopped
    volumes:
      - staticdrop-data:/data
    environment:
      DEPLOY_TOKEN: ${DEPLOY_TOKEN:-change-me-to-a-random-string}
      AUTH_MODE: ${AUTH_MODE:-token}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-to-a-random-password}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-14}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      DATA_DIR: /data
      DEPLOYMENTS_DIR: /data/deployments
      PROJECTS_DIR: /data/projects
      DOMAINS_DIR: /data/domains
      DB_PATH: /data/db/staticdrop.db
      TMP_DIR: /data/tmp
      MAX_ZIP_SIZE: ${MAX_ZIP_SIZE:-104857600}
      MAX_TOTAL_SIZE: ${MAX_TOTAL_SIZE:-524288000}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      MAX_FILE_COUNT: ${MAX_FILE_COUNT:-5000}
      MAX_STORAGE_SIZE: ${MAX_STORAGE_SIZE:-5368709120}
      MIN_FREE_SPACE: ${MIN_FREE_SPACE:-67108864}
      MAX_VERSIONS_PER_PROJECT: ${MAX_VERSIONS_PER_PROJECT:-10}
      AUTO_CLEANUP_ENABLED: ${AUTO_CLEANUP_ENABLED:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────
  # Next.js — web console
  # ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        IMAGE_REGISTRY: ${IMAGE_REGISTRY:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEPLOY_TOKEN: ${DEPLOY_TOKEN:-change-me-to-a-random-string}
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────
  # Nginx — reverse proxy + static file serving
  # ──────────────────────────────────────────────
  nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
      args:
        IMAGE_REGISTRY: ${IMAGE_REGISTRY:-}
    restart: unless-stopped
    ports:
      - "${NGINX_BIND:-0.0.0.0}:${PORT:-8080}:80"
    volumes:
      - staticdrop-data:/data:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  # Optional public domain + automatic HTTPS entrypoint.
  # Start with: docker compose --profile domain up -d
  caddy:
    image: ${IMAGE_REGISTRY:-}caddy:2-alpine
    profiles: ["domain"]
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      nginx:
        condition: service_started

volumes:
  staticdrop-data:
  caddy-data:
  caddy-config:
